<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond 老師的遊戲大廳</title>
    <style>
        body { 
            font-family: "jf-open-huninn", "Microsoft JhengHei", sans-serif; 
            padding: 10px 20px; 
            background-color: #f0f4f8; 
            color: #444;
            text-align: center;
        }
        
        /* 緊湊型標頭配置 */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background-color: #ffffff;
            border: 3px dashed #64b5f6;
            border-radius: 20px;
            padding: 10px 30px;
            margin: 0 auto 20px auto;
            max-width: 1100px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #clock-box { text-align: left; border-right: 2px solid #eee; padding-right: 20px; }
        #date-display { font-size: 1rem; color: #666; }
        #time-display { font-size: 2rem; color: #1e88e5; font-weight: bold; line-height: 1; }

        #encouragement-text {
            font-size: 1.3rem;
            color: #1976d2;
            font-weight: bold;
            flex: 1;
            text-align: left;
        }

        h1 { color: #1565c0; font-size: 1.8em; margin: 10px 0 20px 0; letter-spacing: 2px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .card { 
            display: block;
            padding: 30px 15px; 
            border-radius: 25px; 
            text-decoration: none; 
            color: #333;
            background-color: white;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid white;
        }

        .card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(30, 136, 229, 0.15);
            border-color: #bbdefb;
        }

        .emoji { font-size: 4em; display: block; margin-bottom: 10px; }
        .card h3 { margin: 5px 0; font-size: 1.5em; color: #1565c0; }
        .card p { font-size: 1rem; color: #78909c; margin: 0; font-weight: bold; }

        @media (max-width: 850px) {
            .header-container { flex-direction: column; gap: 10px; }
            #clock-box { border-right: none; padding-right: 0; text-align: center; }
            #encouragement-text { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div id="clock-box">
            <div id="date-display">載入中...</div>
            <div id="time-display">00:00:00</div>
        </div>
        <div id="encouragement-text">✨ 準備好要開始學習了嗎？ ✨</div>
    </div>

    <h1>💎 Diamond 老師的國語遊戲大廳 💎</h1>
    
    <div id="project-list" class="grid"></div>

    <script>
        function updateClock() {
            const now = new Date();
            const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-TW', dateOptions);
            document.getElementById('time-display').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showRandomPhrase() {
            const phrases = [
                "✨ 今天的你，也會有超棒的表現喔！", 
                "🌟 準備好挑戰了嗎？", 
                "💪 每一次練習，都在讓自己變得更厲害！", 
                "🌈 保持專注，你一定可以做得到的！",
                "🐰 阿白和土土也在幫你加油打氣喔！"
            ];
            document.getElementById('encouragement-text').innerText = phrases[Math.floor(Math.random() * phrases.length)];
        }
        showRandomPhrase();

        // 課程資訊對照表 (統一為國語網頁)
        const projectInfo = {
            'G3-diamond': { title: '三年級國語', desc: '有趣的語文練習', filter: 'hue-rotate(0deg)' },
            'G5-diamond': { title: '五年級國語', desc: '高年級挑戰賽', filter: 'hue-rotate(190deg)' },
            'grade-3-web': { title: '語詞翻翻樂', desc: '大家一起動動腦', filter: 'hue-rotate(45deg)' },
            'RICHMAN3': { title: '大富翁遊戲', desc: '誰來搶答', filter: 'hue-rotate(280deg)' },
            'vacab-3': { title: '字彙小學堂', desc: '認識更多新單字', filter: 'hue-rotate(100deg)' }
        };

        async function fetchDiamondProjects() {
            const username = 'marypingu213-code';
            const container = document.getElementById('project-list');
            
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos`);
                const repos = await response.json();
                
                repos.forEach((repo) => {
                    if (projectInfo[repo.name]) {
                        const info = projectInfo[repo.name];
                        const link = `https://${username}.github.io/${repo.name}`;
                        
                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        card.target = '_blank';
                        card.innerHTML = `
                            <span class="emoji" style="filter: ${info.filter}">💎</span>
                            <h3>${info.title}</h3>
                            <p>${info.desc}</p>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (error) { console.error('抓取失敗:', error); }
        }

        fetchDiamondProjects();
    </script>
</body>
</html>
