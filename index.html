<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond 老師的遊戲大廳</title>
    <style>
        body { 
            font-family: "jf-open-huninn", "Microsoft JhengHei", sans-serif; 
            padding: 20px; 
            background-color: #f0f4f8; 
            color: #444;
            text-align: center;
        }
        
        #clock-container {
            background-color: #ffffff;
            border: 3px dashed #64b5f6;
            border-radius: 20px;
            display: inline-block;
            padding: 15px 40px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #date-display { font-size: 1.3rem; color: #666; margin-bottom: 5px; }
        #time-display { font-size: 2.8rem; color: #1e88e5; font-weight: bold; }

        #encouragement-text {
            font-size: 1.6rem;
            color: #1976d2;
            font-weight: bold;
            margin-bottom: 40px;
            min-height: 1.8em;
        }

        h1 { color: #1565c0; font-size: 2.5em; margin-bottom: 30px; letter-spacing: 2px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .card { 
            display: block;
            padding: 40px 20px; 
            border-radius: 25px; 
            text-decoration: none; 
            color: #333;
            background-color: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid white;
            text-align: center;
        }

        .card:hover { 
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(30, 136, 229, 0.2);
            border-color: #bbdefb;
        }

        /* 鑽石圖案與顏色濾鏡 */
        .emoji { 
            font-size: 4.5em; 
            display: block; 
            margin-bottom: 15px; 
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
        }

        .card h3 { margin: 10px 0; font-size: 1.7em; color: #1565c0; }
        .card p { font-size: 1.1em; color: #78909c; margin: 0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="clock-container">
        <div id="date-display">載入中...</div>
        <div id="time-display">00:00:00</div>
    </div>

    <div id="encouragement-text">✨ 歡迎來到 Diamond 老師的學習空間！ ✨</div>

    <h1>💎 Diamond 老師的遊戲大廳 💎</h1>
    
    <div id="project-list" class="grid"></div>

    <script>
        function updateClock() {
            const now = new Date();
            const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-TW', dateOptions);
            document.getElementById('time-display').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showRandomPhrase() {
            const phrases = ["✨ 今天的你，也會有超棒的表現喔！", "🌟 準備好挑戰了嗎？", "💪 每一次練習，都在讓自己變得更厲害！", "🌈 保持專注，你一定可以做得到的！"];
            document.getElementById('encouragement-text').innerText = phrases[Math.floor(Math.random() * phrases.length)];
        }
        showRandomPhrase();

        // 課程資訊對照表
        const projectInfo = {
            'G3-diamond': { title: '三年級國語', desc: '有趣的語文練習', filter: 'hue-rotate(0deg)' },
            'G5-diamond': { title: '五年級國語', desc: '高年級挑戰賽', filter: 'hue-rotate(190deg)' }, // 藍鑽
            'grade-3-web': { title: '三年級數學', desc: '數字小勇者', filter: 'hue-rotate(45deg)' }, // 紫鑽
            'RICHMAN3': { title: '大富翁遊戲', desc: '理財小高手', filter: 'hue-rotate(280deg)' }, // 粉鑽
            'vacab-3': { title: '字彙小學堂', desc: '認識更多新單字', filter: 'hue-rotate(100deg)' } // 綠鑽
        };

        async function fetchDiamondProjects() {
            const username = 'marypingu213-code';
            const container = document.getElementById('project-list');
            
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos`);
                const repos = await response.json();
                
                repos.forEach((repo) => {
                    if (projectInfo[repo.name]) {
                        const info = projectInfo[repo.name];
                        const link = `https://${username}.github.io/${repo.name}`;
                        
                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        card.target = '_blank';
                        card.innerHTML = `
                            <span class="emoji" style="filter: ${info.filter}">💎</span>
                            <h3>${info.title}</h3>
                            <p>${info.desc}</p>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (error) { console.error('抓取失敗:', error); }
        }

        fetchDiamondProjects();
    </script>
</body>
</html>
