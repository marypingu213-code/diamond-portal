<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond 老師的遊戲大廳</title>
    <style>
        /* 使用圓潤的粉圓體字型，對學生更具親和力 */
        body { 
            font-family: "jf-open-huninn", "Microsoft JhengHei", sans-serif; 
            padding: 20px; 
            background-color: #f0f4f8; /* 清爽的藍色調背景 */
            color: #444;
            text-align: center;
        }
        
        /* 時光布告欄 */
        #clock-container {
            background-color: #ffffff;
            border: 3px dashed #64b5f6;
            border-radius: 20px;
            display: inline-block;
            padding: 15px 40px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #date-display { font-size: 1.3rem; color: #666; margin-bottom: 5px; }
        #time-display { font-size: 2.8rem; color: #1e88e5; font-weight: bold; }

        /* 隨機鼓勵語區塊 */
        #encouragement-text {
            font-size: 1.6rem;
            color: #1976d2;
            font-weight: bold;
            margin-bottom: 40px;
            min-height: 1.8em;
        }

        h1 { color: #1565c0; font-size: 2.5em; margin-bottom: 30px; letter-spacing: 2px; }
        
        /* 遊戲卡片佈局 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .card { 
            display: block;
            padding: 40px 20px; 
            border-radius: 25px; 
            text-decoration: none; 
            color: #333;
            background-color: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid white;
            text-align: center;
        }

        .card:hover { 
            transform: scale(1.05) rotate(-2deg); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .emoji { font-size: 4.5em; display: block; margin-bottom: 15px; }
        .card h3 { margin: 10px 0; font-size: 1.5em; color: #222; }
        .card p { font-size: 1.05em; color: #666; margin: 0; }
    </style>
</head>
<body>

    <div id="clock-container">
        <div id="date-display">正在載入日期...</div>
        <div id="time-display">00:00:00</div>
    </div>

    <div id="encouragement-text">✨ 歡迎來到 Diamond 老師的學習空間！ ✨</div>

    <h1>💎 Diamond 老師的遊戲大廳 💎</h1>
    
    <div id="project-list" class="grid">
        </div>

    <script>
        // 1. 更新日期與時間
        function updateClock() {
            const now = new Date();
            const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-TW', dateOptions);
            document.getElementById('time-display').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 隨機鼓勵語
        const magicPhrases = [
            "✨ 今天的你，也會有超棒的表現喔！",
            "🌟 準備好挑戰 Diamond 老師設計的遊戲了嗎？",
            "💪 每一次練習，都在讓自己變得更厲害！",
            "🌈 保持專注，你一定可以做得到的！"
        ];
        function showRandomPhrase() {
            const phraseElement = document.getElementById('encouragement-text');
            phraseElement.innerText = magicPhrases[Math.floor(Math.random() * magicPhrases.length)];
        }
        showRandomPhrase();

        // 3. 抓取 GitHub 專案
        async function fetchDiamondProjects() {
            const username = 'marypingu213-code'; // 託管於妳的帳號
            const container = document.getElementById('project-list');
            
            // --- 更新：Diamond 老師的所有專案清單 ---
            const diamondRepos = ['grade-3-web', 'RICHMAN3', 'G5-diamond', 'vacab-3', 'G3-diamond'];
            const cardColors = ['#E3F2FD', '#E8EAF6', '#E0F2F1', '#F3E5F5', '#FFF3E0'];

            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos`);
                const repos = await response.json();
                
                let foundCount = 0;
                repos.forEach((repo) => {
                    // 只顯示屬於 Diamond 老師的專案
                    if (diamondRepos.includes(repo.name)) { 
                        const link = `https://${username}.github.io/${repo.name}`;
                        const color = cardColors[foundCount % cardColors.length];
                        
                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        card.target = '_blank';
                        card.style.backgroundColor = color;
                        card.innerHTML = `
                            <span class="emoji">💎</span>
                            <h3>${repo.name}</h3>
                            <p>點擊開始 Diamond 老師的課程</p>
                        `;
                        container.appendChild(card);
                        foundCount++;
                    }
                });
            } catch (error) {
                console.error('抓取失敗:', error);
            }
        }

        fetchDiamondProjects();
    </script>
</body>
</html>
