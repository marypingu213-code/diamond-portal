<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond 老師的遊戲大廳</title>
    <style>
        /* 滿版背景與舒適的四周留白 */
        body { 
            font-family: "jf-open-huninn", "Microsoft JhengHei", sans-serif; 
            margin: 0;
            padding: 3vh 3vw; 
            background-color: #f0f4f8; 
            color: #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        /* 旗艦大廳主容器：放寬到 1600px */
        .main-container {
            width: 100%;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }
        
        /* 頂部資訊看板：巨大化、滿版延伸 */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            background-color: #ffffff;
            border: 4px dashed #64b5f6;
            border-radius: 30px;
            padding: 20px 40px;
            margin: 0 auto 40px auto;
            width: 100%;
            max-width: 1400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        #clock-box { 
            text-align: left; 
            border-right: 3px solid #eee; 
            padding-right: 40px; 
        }
        #date-display { font-size: clamp(18px, 1.5vw, 24px); color: #666; font-weight: bold; margin-bottom: 5px;}
        #time-display { font-size: clamp(36px, 3.5vw, 60px); color: #1e88e5; font-weight: bold; line-height: 1; }

        #encouragement-text {
            font-size: clamp(24px, 2.5vw, 40px);
            color: #1976d2;
            font-weight: bold;
            flex: 1;
            text-align: left;
        }

        h1 { 
            color: #1565c0; 
            font-size: clamp(36px, 3.5vw, 60px); 
            margin: 10px 0 40px 0; 
            letter-spacing: 3px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        /* 網格系統自動展開：按鈕變超大 */
        .grid { 
            display: grid; 
            /* 每張卡片至少 320px 寬，自動排滿 */
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; 
            width: 100%; 
        }

        /* 巨無霸卡片 */
        .card { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px; 
            border-radius: 35px; 
            text-decoration: none; 
            background-color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.06);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid transparent;
            min-height: 280px; /* 卡片長高 */
            box-sizing: border-box;
        }

        .card:hover { 
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(30, 136, 229, 0.15);
            border-color: #bbdefb;
            background-color: #f8fbff;
        }

        .emoji { font-size: clamp(80px, 8vw, 140px); display: block; margin-bottom: 20px; }
        .card h3 { margin: 0 0 15px 0; font-size: clamp(28px, 2.5vw, 40px); color: #1565c0; }
        .card p { font-size: clamp(18px, 1.5vw, 24px); color: #78909c; margin: 0; font-weight: bold; }

        @media (max-width: 900px) {
            .header-container { flex-direction: column; gap: 20px; padding: 20px; text-align: center;}
            #clock-box { border-right: none; padding-right: 0; border-bottom: 2px solid #eee; padding-bottom: 20px;}
            #encouragement-text { text-align: center; }
            .card { min-height: 200px; padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-container">
            <div id="clock-box">
                <div id="date-display">載入中...</div>
                <div id="time-display">00:00:00</div>
            </div>
            <div id="encouragement-text">✨ 準備好要開始學習了嗎？ ✨</div>
        </div>

        <h1>💎 Diamond 老師的國語遊戲大廳 💎</h1>
        
        <div id="project-list" class="grid"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-TW', dateOptions);
            document.getElementById('time-display').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function showRandomPhrase() {
            const phrases = [
                "✨ 今天的你，也會有超棒的表現喔！", 
                "🌟 準備好挑戰了嗎？", 
                "💪 每一次練習，都在讓自己變得更厲害！", 
                "🌈 保持專注，你一定可以做得到的！",
                "🐰 阿白和土土也在幫你加油打氣喔！"
            ];
            document.getElementById('encouragement-text').innerText = phrases[Math.floor(Math.random() * phrases.length)];
        }
        showRandomPhrase();

        // 課程資訊對照表
        const projectInfo = {
            'G3-diamond': { title: '三年級國語', desc: '有趣的語文練習', filter: 'hue-rotate(0deg)' },
            'G5-diamond': { title: '五年級國語', desc: '高年級挑戰賽', filter: 'hue-rotate(190deg)' },
            'grade-3-web': { title: '語詞翻翻樂', desc: '大家一起動動腦', filter: 'hue-rotate(45deg)' },
            'RICHMAN3': { title: '大富翁遊戲', desc: '誰來搶答', filter: 'hue-rotate(280deg)' },
            'vacab-3': { title: '字彙小學堂', desc: '認識更多新單字', filter: 'hue-rotate(100deg)' }
        };

        async function fetchDiamondProjects() {
            const username = 'marypingu213-code';
            const container = document.getElementById('project-list');
            
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos`);
                const repos = await response.json();
                
                repos.forEach((repo) => {
                    if (projectInfo[repo.name]) {
                        const info = projectInfo[repo.name];
                        const link = `https://${username}.github.io/${repo.name}`;
                        
                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        card.target = '_blank'; // 點擊會開新分頁
                        card.innerHTML = `
                            <span class="emoji" style="filter: ${info.filter}">💎</span>
                            <h3>${info.title}</h3>
                            <p>${info.desc}</p>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (error) { console.error('抓取失敗:', error); }
        }

        fetchDiamondProjects();
    </script>
</body>
</html>
